<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  #root { display: flex; flex-direction: column; gap: 22px; }
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .cols { display: grid; grid-template-columns: 1.1fr 1fr; gap: 24px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const NS = window.VetNaliaDesignSystem_7efbb4;
  const { SearchBar, AvailabilitySlot, ReviewItem, FilterChipGroup, AddressPreview, EmptyState, Card } = NS;
  function Demo() {
    return (
      <>
        <div className="grp">
          <span className="lbl">Search Bar</span>
          <SearchBar />
        </div>
        <div className="cols">
          <div className="grp">
            <span className="lbl">Availability Slots</span>
            <div className="row">
              <AvailabilitySlot time="08:00" />
              <AvailabilitySlot time="09:00" state="occupied" />
              <AvailabilitySlot time="10:30" />
              <AvailabilitySlot time="14:00" state="selected" />
              <AvailabilitySlot time="16:30" />
            </div>
            <div className="grp" style={{marginTop:8}}>
              <span className="lbl">Filter Chip Group</span>
              <FilterChipGroup defaultValue={["home"]} options={[
                {value:"dog",label:"Cão",icon:"paw-print"},
                {value:"cat",label:"Gato",icon:"paw-print"},
                {value:"emergency",label:"Emergência"},
                {value:"home",label:"Visita em casa",icon:"home"},
              ]} />
            </div>
          </div>
          <div className="grp">
            <span className="lbl">Review Item</span>
            <Card pad>
              <ReviewItem author="Camila R." meta="tutora da Mel" rating={5} date="há 2 dias"
                text="A Dra. Helena foi super atenciosa. O atendimento em casa fez toda a diferença." />
              <ReviewItem author="Bruno T." meta="tutor do Thor" rating={5} date="há 1 semana" divider={false}
                text="Pontual, profissional e muito cuidadosa." />
            </Card>
          </div>
        </div>
        <div className="cols">
          <div className="grp">
            <span className="lbl">Address Preview</span>
            <AddressPreview address="Rua Augusta, 1024 — Consolação, São Paulo" distanceKm={2.4} action="Alterar" />
          </div>
          <div className="grp">
            <span className="lbl">Empty State</span>
            <Card pad>
              <EmptyState compact icon="search" title="Nenhum vet encontrado"
                description="Tente ampliar a distância ou remover alguns filtros."
                action="Limpar filtros" actionIcon="x" />
            </Card>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
