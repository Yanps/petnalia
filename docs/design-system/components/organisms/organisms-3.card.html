<!-- @dsCard group="Components" viewport="900x560" name="Organisms · Layout" subtitle="Header, Footer, FilterDrawer, AddressSelector" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  #root { display: flex; flex-direction: column; gap: 22px; }
  .grp { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .frame { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .stage { position: relative; height: 300px; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const NS = window.VetNaliaDesignSystem_7efbb4;
  const { Header, Footer, FilterDrawer, AddressSelector, SearchFilters, Button } = NS;
  const LOGO = "../../assets/brand/petnalia-horizontal.png";
  function Demo() {
    const [open,setOpen]=React.useState(false);
    const [addr,setAddr]=React.useState("home");
    return (
      <>
        <div className="grp">
          <span className="lbl">Header — signed in</span>
          <div className="frame"><Header logoSrc={LOGO}
            links={[{id:"home",label:"Início"},{id:"search",label:"Buscar vets"},{id:"how",label:"Como funciona"}]}
            active="home" city="São Paulo" user={{name:"Camila Rocha",status:"online"}} unread onNav={()=>{}} /></div>
        </div>
        <div className="grp">
          <span className="lbl">Header — logged out / compact</span>
          <div className="frame"><Header logoSrc={LOGO} compact city="São Paulo" onLogin={()=>{}} /></div>
        </div>
        <div className="cols">
          <div className="grp">
            <span className="lbl">AddressSelector</span>
            <AddressSelector selectedId={addr} onSelect={setAddr} onAdd={()=>{}} addresses={[
              {id:"home",label:"Casa",address:"Rua Augusta, 1024 — Consolação",distanceKm:2.4},
              {id:"work",label:"Trabalho",address:"Av. Paulista, 1000 — Bela Vista",distanceKm:3.1},
            ]} />
          </div>
          <div className="grp">
            <span className="lbl">FilterDrawer (mobile filters)</span>
            <Button variant="secondary" iconLeft="sliders" onClick={()=>setOpen(true)}>Abrir filtros</Button>
            <div className="stage">
              <FilterDrawer open={open} onClose={()=>setOpen(false)} onApply={()=>setOpen(false)} resultCount={48}
                style={{position:"absolute"}}><SearchFilters /></FilterDrawer>
              <div style={{position:"absolute",inset:0,display:"grid",placeItems:"center",color:"var(--text-muted)",fontSize:13,padding:20,textAlign:"center"}}>
                Drawer renders over this stage →<br/>tap "Abrir filtros"
              </div>
            </div>
          </div>
        </div>
        <div className="grp">
          <span className="lbl">Footer</span>
          <div className="frame"><Footer logoSrc={LOGO} columns={[
            {title:"Produto",links:[{label:"Buscar vets"},{label:"Como funciona"},{label:"Preços"}]},
            {title:"Para vets",links:[{label:"Seja parceiro"},{label:"Entrar"}]},
            {title:"Suporte",links:[{label:"Central de ajuda"},{label:"Contato"}]},
          ]} social={[{icon:"message-circle",label:"WhatsApp"},{icon:"phone",label:"Telefone"}]} /></div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
