<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  #root { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.VetNaliaDesignSystem_7efbb4;
  function Demo() {
    return (
      <>
        <div className="stack">
          <Input label="Search" icon="search" placeholder="Vet, specialty, city" />
          <Input label="Email" type="email" icon="user" placeholder="you@email.com" required hint="We'll send your confirmation here." />
          <Input label="Postal code" defaultValue="0100" error="Enter a valid CEP" />
        </div>
        <div className="stack">
          <Select label="Species" placeholder="Choose…" options={["Dog","Cat","Rabbit","Bird"]} />
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            <span style={{fontSize:"14px",fontWeight:600,color:"var(--text)"}}>Preferences</span>
            <Checkbox label="Home visit available" defaultChecked />
            <Checkbox label="Accepts new patients" />
            <Switch label="Online consultations" defaultChecked />
            <Switch label="SMS reminders" />
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
