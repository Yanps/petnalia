<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Marketing Template" description="Header · Hero · Features · Testimonials · FAQ · CTA · Footer — for Homepage, Vet Landing, Pricing, About" -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>

<div style="min-height:100%;background:var(--bg);font-family:var(--font-sans)">

  <!-- HEADER organism -->
  <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.Header" logo-src="{{ logo }}" links="{{ navLinks }}" active="home" city="São Paulo" user="{{ user }}" unread="{{ yes }}" hint-size="100%,68px"></x-import>

  <!-- HERO region -->
  <section style="position:relative;overflow:hidden;background:linear-gradient(160deg,var(--teal-700),var(--blue-700))">
    <div style="position:absolute;inset:0;opacity:.5;background:radial-gradient(60% 80% at 85% 10%, rgba(45,212,191,.35), transparent 60%)"></div>
    <div style="position:relative;max-width:1200px;margin:0 auto;padding:72px 24px 88px">
      <span style="display:inline-block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:18px">Hero Section</span>
      <div style="height:50px;width:min(620px,90%);background:rgba(255,255,255,.9);border-radius:10px"></div>
      <div style="height:50px;width:min(420px,70%);background:rgba(255,255,255,.65);border-radius:10px;margin-top:12px"></div>
      <div style="height:18px;width:min(440px,80%);background:rgba(255,255,255,.4);border-radius:6px;margin:22px 0 32px"></div>
      <div style="max-width:760px">
        <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.SearchBar" hint-size="100%,72px"></x-import>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:28px">
        <div style="height:16px;width:160px;background:rgba(255,255,255,.45);border-radius:6px"></div>
        <div style="height:16px;width:150px;background:rgba(255,255,255,.45);border-radius:6px"></div>
        <div style="height:16px;width:140px;background:rgba(255,255,255,.45);border-radius:6px"></div>
      </div>
    </div>
  </section>

  <!-- FEATURES region -->
  <section style="max-width:1200px;margin:0 auto;padding:64px 24px 24px">
    <span style="display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);margin-bottom:8px">Feature Sections</span>
    <div style="height:30px;width:320px;max-width:80%;background:var(--surface-inset);border-radius:8px;margin-bottom:28px"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:28px">
      <div style="display:flex;flex-direction:column;gap:12px"><span style="width:48px;height:48px;border-radius:14px;background:var(--brand-subtle)"></span><div style="height:18px;width:70%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:100%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:80%;background:var(--surface-inset);border-radius:6px"></div></div>
      <div style="display:flex;flex-direction:column;gap:12px"><span style="width:48px;height:48px;border-radius:14px;background:var(--brand-subtle)"></span><div style="height:18px;width:70%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:100%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:80%;background:var(--surface-inset);border-radius:6px"></div></div>
      <div style="display:flex;flex-direction:column;gap:12px"><span style="width:48px;height:48px;border-radius:14px;background:var(--brand-subtle)"></span><div style="height:18px;width:70%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:100%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:80%;background:var(--surface-inset);border-radius:6px"></div></div>
      <div style="display:flex;flex-direction:column;gap:12px"><span style="width:48px;height:48px;border-radius:14px;background:var(--brand-subtle)"></span><div style="height:18px;width:70%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:100%;background:var(--surface-inset);border-radius:6px"></div><div style="height:13px;width:80%;background:var(--surface-inset);border-radius:6px"></div></div>
    </div>
  </section>

  <!-- TESTIMONIALS region (ReviewList organism, loading placeholder) -->
  <section style="max-width:1200px;margin:0 auto;padding:48px 24px">
    <span style="display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);margin-bottom:16px">Testimonials</span>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px">
      <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.ReviewList" loading="{{ yes }}" hint-size="100%,240px"></x-import>
    </div>
  </section>

  <!-- FAQ region -->
  <section style="max-width:820px;margin:0 auto;padding:24px 24px 48px">
    <span style="display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);margin-bottom:16px">FAQ</span>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px"><div style="height:16px;width:55%;background:var(--surface-inset);border-radius:6px"></div><span style="width:18px;height:18px;border-radius:5px;background:var(--surface-inset)"></span></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px"><div style="height:16px;width:62%;background:var(--surface-inset);border-radius:6px"></div><span style="width:18px;height:18px;border-radius:5px;background:var(--surface-inset)"></span></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px"><div style="height:16px;width:48%;background:var(--surface-inset);border-radius:6px"></div><span style="width:18px;height:18px;border-radius:5px;background:var(--surface-inset)"></span></div>
    </div>
  </section>

  <!-- CTA region -->
  <section style="max-width:1200px;margin:0 auto;padding:0 24px 64px">
    <div style="position:relative;overflow:hidden;border-radius:24px;background:linear-gradient(120deg,var(--teal-600),var(--blue-700));padding:56px 32px;text-align:center">
      <span style="display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:14px">CTA Section</span>
      <div style="height:30px;width:min(440px,80%);background:rgba(255,255,255,.9);border-radius:8px;margin:0 auto 12px"></div>
      <div style="height:16px;width:min(320px,70%);background:rgba(255,255,255,.5);border-radius:6px;margin:0 auto 28px"></div>
      <div style="display:inline-block;height:52px;width:200px;background:#fff;border-radius:12px"></div>
    </div>
  </section>

  <!-- FOOTER organism -->
  <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.Footer" logo-src="{{ logo }}" columns="{{ footerColumns }}" social="{{ social }}" hint-size="100%,300px"></x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      yes: true,
      logo: "../../assets/brand/petnalia-horizontal.png",
      navLinks: [
        { id: "home", label: "Início" },
        { id: "search", label: "Buscar vets" },
        { id: "how", label: "Como funciona" },
        { id: "pricing", label: "Preços" },
      ],
      user: { name: "Camila Rocha", status: "online" },
      footerColumns: [
        { title: "Produto", links: [{ label: "Buscar vets" }, { label: "Como funciona" }, { label: "Preços" }] },
        { title: "Para vets", links: [{ label: "Seja parceiro" }, { label: "Entrar" }] },
        { title: "Suporte", links: [{ label: "Central de ajuda" }, { label: "Contato" }] },
      ],
      social: [
        { icon: "message-circle", label: "WhatsApp" },
        { icon: "phone", label: "Telefone" },
      ],
    };
  }
}
</script>
</body>
</html>
