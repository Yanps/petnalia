<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Veterinarian Profile Template" description="Header · VetHero · Services · CoverageMap · Reviews + sticky BookingSidebar · Footer — for Vet Profile Page" -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>

<div style="min-height:100%;background:var(--bg);font-family:var(--font-sans)">

  <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.Header" logo-src="{{ logo }}" links="{{ navLinks }}" active="search" city="São Paulo" user="{{ user }}" hint-size="100%,68px"></x-import>

  <div style="max-width:1120px;margin:0 auto;padding:24px">
    <!-- Breadcrumb placeholder -->
    <div style="height:13px;width:300px;max-width:80%;background:var(--surface-inset);border-radius:6px;margin-bottom:16px"></div>

    <!-- VET HERO organism -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:var(--shadow-sm)">
      <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.VetHero" vet-name="Dra. Helena Marques" specialty="Felinos · Dermatologia" crm="CRMV-SP 28431" rating="{{ rating }}" reviews="{{ reviews }}" distance="{{ distance }}" home-visit="{{ yes }}" online="{{ yes }}" verified="{{ yes }}" status="online" hint-size="100%,180px"></x-import>
    </div>

    <!-- Two-column: main content + sticky booking sidebar -->
    <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-top:24px">

      <main style="flex:999 1 460px;min-width:300px;display:flex;flex-direction:column;gap:24px">
        <!-- SERVICES LIST organism -->
        <section style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px">
          <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:12px">Services List</span>
          <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.ServicesList" services="{{ services }}" selectable="{{ yes }}" hint-size="100%,220px"></x-import>
        </section>

        <!-- COVERAGE MAP organism -->
        <section>
          <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:8px">Coverage Map</span>
          <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.CoverageMap" covered="{{ yes }}" radius-km="8" area-label="Zona Oeste · São Paulo" pins="{{ pins }}" hint-size="100%,280px"></x-import>
        </section>

        <!-- REVIEW LIST organism (loading placeholder) -->
        <section style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px">
          <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:12px">Review List</span>
          <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.ReviewList" loading="{{ yes }}" hint-size="100%,240px"></x-import>
        </section>
      </main>

      <!-- Sticky Booking Sidebar (desktop) / sticky CTA (mobile) -->
      <aside style="flex:1 1 320px;min-width:300px;position:sticky;top:84px">
        <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.BookingSidebar" price="180" next-available="Hoje 16:30" hint-size="100%,360px"></x-import>
      </aside>
    </div>
  </div>

  <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.Footer" logo-src="{{ logo }}" columns="{{ footerColumns }}" social="{{ social }}" hint-size="100%,300px"></x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      yes: true,
      vetName: "Dra. Helena Marques",
      rating: 4.9, reviews: 213, distance: 2.4,
      logo: "../../assets/brand/petnalia-horizontal.png",
      pins: [{ top: 35, left: 30 }, { top: 60, left: 65 }, { top: 48, left: 75 }],
      services: [
        { icon: "home", name: "Visita domiciliar", duration: "45 min", price: 180, from: true },
        { icon: "video", name: "Teleconsulta", duration: "30 min", price: 120, from: true },
        { icon: "syringe", name: "Vacinação a domicílio", price: 90, from: true },
      ],
      navLinks: [
        { id: "home", label: "Início" },
        { id: "search", label: "Buscar vets" },
        { id: "how", label: "Como funciona" },
      ],
      user: { name: "Camila Rocha", status: "online" },
      footerColumns: [
        { title: "Produto", links: [{ label: "Buscar vets" }, { label: "Como funciona" }] },
        { title: "Para vets", links: [{ label: "Seja parceiro" }, { label: "Entrar" }] },
        { title: "Suporte", links: [{ label: "Central de ajuda" }, { label: "Contato" }] },
      ],
      social: [{ icon: "message-circle", label: "WhatsApp" }, { icon: "phone", label: "Telefone" }],
    };
  }
}
</script>
</body>
</html>
