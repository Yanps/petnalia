<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Dashboard Template" description="Persistent sidebar nav · Top nav · Metrics widgets · Content (AppointmentTimeline) — for Vet Dashboard & Management" -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>

<div style="min-height:100%;background:var(--bg);font-family:var(--font-sans);display:flex;flex-wrap:wrap;align-items:stretch">

  <!-- SIDEBAR NAVIGATION (persistent desktop · drawer mobile) -->
  <aside style="flex:1 1 240px;min-width:220px;max-width:280px;background:var(--surface);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;gap:8px">
    <div style="padding:8px 8px 16px"><img src="../../assets/brand/petnalia-horizontal.png" alt="PetNalia" style="height:30px;width:auto" /></div>
    <div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;background:var(--brand-subtle)"><span style="width:20px;height:20px;border-radius:6px;background:var(--brand)"></span><div style="height:13px;width:90px;background:var(--brand-border);border-radius:5px"></div></div>
    <div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px"><span style="width:20px;height:20px;border-radius:6px;background:var(--surface-inset)"></span><div style="height:13px;width:110px;background:var(--surface-inset);border-radius:5px"></div></div>
    <div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px"><span style="width:20px;height:20px;border-radius:6px;background:var(--surface-inset)"></span><div style="height:13px;width:80px;background:var(--surface-inset);border-radius:5px"></div></div>
    <div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px"><span style="width:20px;height:20px;border-radius:6px;background:var(--surface-inset)"></span><div style="height:13px;width:120px;background:var(--surface-inset);border-radius:5px"></div></div>
    <div style="display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px"><span style="width:20px;height:20px;border-radius:6px;background:var(--surface-inset)"></span><div style="height:13px;width:70px;background:var(--surface-inset);border-radius:5px"></div></div>
    <div style="margin-top:auto;display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;border:1px solid var(--border)"><span style="width:28px;height:28px;border-radius:50%;background:var(--brand-subtle)"></span><div style="height:12px;width:90px;background:var(--surface-inset);border-radius:5px"></div></div>
  </aside>

  <!-- MAIN: top nav + content -->
  <div style="flex:999 1 560px;min-width:320px;display:flex;flex-direction:column">

    <!-- TOP NAVIGATION -->
    <header style="display:flex;align-items:center;justify-content:space-between;gap:16px;height:68px;padding:0 24px;background:color-mix(in srgb, var(--surface) 85%, transparent);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20">
      <div style="height:22px;width:200px;background:var(--surface-inset);border-radius:6px"></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="width:40px;height:40px;border-radius:10px;border:1px solid var(--border);display:grid;place-items:center"><span style="width:18px;height:18px;border-radius:5px;background:var(--surface-inset)"></span></span>
        <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.Avatar" full-name="Helena Marques" size="md" status="online" hint-size="40px,40px"></x-import>
      </div>
    </header>

    <div style="padding:24px;display:flex;flex-direction:column;gap:24px">
      <!-- METRICS WIDGETS region -->
      <div>
        <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:12px">Metrics Widgets</span>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm)"><div style="height:12px;width:70%;background:var(--surface-inset);border-radius:5px"></div><div style="height:32px;width:50%;background:var(--surface-inset);border-radius:6px;margin:12px 0 8px"></div><div style="height:18px;width:60px;background:var(--green-100);border-radius:999px"></div></div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm)"><div style="height:12px;width:70%;background:var(--surface-inset);border-radius:5px"></div><div style="height:32px;width:50%;background:var(--surface-inset);border-radius:6px;margin:12px 0 8px"></div><div style="height:18px;width:60px;background:var(--green-100);border-radius:999px"></div></div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm)"><div style="height:12px;width:70%;background:var(--surface-inset);border-radius:5px"></div><div style="height:32px;width:50%;background:var(--surface-inset);border-radius:6px;margin:12px 0 8px"></div><div style="height:18px;width:60px;background:var(--warning-100);border-radius:999px"></div></div>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm)"><div style="height:12px;width:70%;background:var(--surface-inset);border-radius:5px"></div><div style="height:32px;width:50%;background:var(--surface-inset);border-radius:6px;margin:12px 0 8px"></div><div style="height:18px;width:60px;background:var(--brand-subtle);border-radius:999px"></div></div>
        </div>
      </div>

      <!-- CONTENT AREA: two regions -->
      <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start">
        <section style="flex:999 1 380px;min-width:280px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px">
          <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:12px">Content · Próximas consultas</span>
          <x-import component-from-global-scope="VetNaliaDesignSystem_7efbb4.AppointmentTimeline" loading="{{ yes }}" hint-size="100%,260px"></x-import>
        </section>
        <section style="flex:1 1 260px;min-width:240px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px">
          <span style="display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);margin-bottom:12px">Disponibilidade</span>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div style="height:44px;background:var(--surface-inset);border-radius:10px"></div>
            <div style="height:44px;background:var(--surface-inset);border-radius:10px"></div>
            <div style="height:44px;background:var(--surface-inset);border-radius:10px"></div>
          </div>
        </section>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860}}">
class Component extends DCLogic {
  renderVals() {
    return { yes: true };
  }
}
</script>
</body>
</html>
