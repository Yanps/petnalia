<!-- @dsCard group="Colors" viewport="700x150" name="Primary · Teal" subtitle="Brand teal scale — trust & healthcare" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw .n { font-size: 11px; font-weight: 700; }
  .sw .h { font-size: 10px; font-family: var(--font-mono); opacity: .85; }
  .lt { color: var(--slate-900); }
  .dk { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--teal-50)"><span class="n lt">50</span><span class="h lt">#F0FDFA</span></div>
    <div class="sw" style="background:var(--teal-100)"><span class="n lt">100</span><span class="h lt">#CCFBF1</span></div>
    <div class="sw" style="background:var(--teal-200)"><span class="n lt">200</span><span class="h lt">#99F6E4</span></div>
    <div class="sw" style="background:var(--teal-300)"><span class="n lt">300</span><span class="h lt">#5EEAD4</span></div>
    <div class="sw" style="background:var(--teal-400)"><span class="n lt">400</span><span class="h lt">#2DD4BF</span></div>
    <div class="sw" style="background:var(--teal-500)"><span class="n dk">500</span><span class="h dk">#0D9488</span></div>
    <div class="sw" style="background:var(--teal-600)"><span class="n dk">600</span><span class="h dk">#0F766E</span></div>
    <div class="sw" style="background:var(--teal-700)"><span class="n dk">700</span><span class="h dk">#115E59</span></div>
    <div class="sw" style="background:var(--teal-800)"><span class="n dk">800</span><span class="h dk">#134E4A</span></div>
    <div class="sw" style="background:var(--teal-900)"><span class="n dk">900</span><span class="h dk">#0F2F2C</span></div>
  </div>
</body>
</html>
