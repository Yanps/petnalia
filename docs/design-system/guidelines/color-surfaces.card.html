<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces · Light & Dark" subtitle="Semantic surface, text & border tokens across themes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; display: flex; }
  .pane { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
  .tag { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 6px; }
  .h { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
  .p { font-size: 12.5px; color: var(--text-secondary); }
  .m { font-size: 11px; color: var(--text-muted); }
  .dot { width: 10px; height: 10px; border-radius: var(--radius-full); background: var(--brand); display: inline-block; }
</style>
</head>
<body>
  <div class="pane" data-theme="light">
    <span class="tag">Light</span>
    <div class="card">
      <div class="h"><span class="dot"></span> Dr. Helena Marques</div>
      <div class="p">Surface on app canvas with hairline border.</div>
      <div class="m">Muted meta text · slate 500</div>
    </div>
  </div>
  <div class="pane" data-theme="dark">
    <span class="tag">Dark</span>
    <div class="card">
      <div class="h"><span class="dot"></span> Dr. Helena Marques</div>
      <div class="p">Same tokens, dark theme remap.</div>
      <div class="m">Muted meta text · slate 400</div>
    </div>
  </div>
</body>
</html>
