packages:
  - 'apps/*'
  - 'packages/*'

# Allow post-install build scripts for native modules and code generators.
# Required by pnpm 10's secure-by-default build script policy.
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - argon2
  - esbuild
  - msgpackr-extract
  - sharp
  - unrs-resolver
